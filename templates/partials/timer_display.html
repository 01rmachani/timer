{% set mins = remaining // 60 %}
{% set secs = remaining % 60 %}
{% set done = remaining == 0 and not running %}

<div
  {% if running %}
    hx-get="/timer/state"
    hx-trigger="every 1s"
    hx-target="#timer-display"
    hx-swap="innerHTML"
  {% endif %}
  class="flex flex-col items-center gap-6"
>
  <!-- Clock face -->
  <div class="relative flex items-center justify-center w-48 h-48 rounded-full border-4
    {% if done %}border-green-500{% elif running %}border-blue-500{% else %}border-gray-700{% endif %}
    transition-colors duration-500">
    <span class="font-mono text-5xl font-bold tracking-tight
      {% if done %}text-green-400{% elif running %}text-white{% else %}text-gray-300{% endif %}">
      {{ '%02d'|format(mins) }}:{{ '%02d'|format(secs) }}
    </span>
  </div>

  <!-- Status label -->
  <p class="text-sm font-medium
    {% if done %}text-green-400{% elif running %}text-blue-400 animate-pulse{% else %}text-gray-500{% endif %}">
    {% if done %}Time's up!{% elif running %}Running…{% else %}Ready{% endif %}
  </p>

  <!-- Controls -->
  <div class="flex gap-3">
    {% if running %}
    <button hx-post="/timer/pause" hx-target="#timer-display" hx-swap="innerHTML"
            class="bg-yellow-600 hover:bg-yellow-500 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors">
      Pause
    </button>
    {% else %}
    <button hx-post="/timer/reset" hx-target="#timer-display" hx-swap="innerHTML"
            class="bg-gray-700 hover:bg-gray-600 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors">
      Reset
    </button>
    {% endif %}
  </div>
</div>
