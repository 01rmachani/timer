<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Countdown Timer</title>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <link href="https://cdn.jsdelivr.net/npm/tailwindcss@3/dist/tailwind.min.css" rel="stylesheet">
</head>
<body class="bg-gray-950 text-gray-100 min-h-screen flex items-center justify-center">
  <div class="max-w-md w-full mx-auto py-12 px-6 text-center">
    <h1 class="text-3xl font-bold mb-2">Countdown Timer</h1>
    <p class="text-gray-400 mb-10">Set a duration and start counting down.</p>

    <!-- Timer display (polls every second when running) -->
    <div id="timer-display">
      {% include "partials/timer_display.html" %}
    </div>

    <!-- Set duration form -->
    <form hx-post="/timer/start" hx-target="#timer-display" hx-swap="innerHTML"
          class="mt-8 flex items-center justify-center gap-3">
      <div class="flex flex-col items-center">
        <label class="text-xs text-gray-500 mb-1">Minutes</label>
        <input type="number" name="minutes" min="0" max="99" value="1"
               class="w-20 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-center text-lg font-mono focus:outline-none focus:border-blue-500">
      </div>
      <span class="text-2xl font-bold text-gray-500 mt-4">:</span>
      <div class="flex flex-col items-center">
        <label class="text-xs text-gray-500 mb-1">Seconds</label>
        <input type="number" name="seconds" min="0" max="59" value="0"
               class="w-20 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-center text-lg font-mono focus:outline-none focus:border-blue-500">
      </div>
      <button type="submit"
              class="mt-4 bg-blue-600 hover:bg-blue-500 text-white px-5 py-2 rounded-lg text-sm font-medium transition-colors">
        Start
      </button>
    </form>
  </div>
</body>
</html>
